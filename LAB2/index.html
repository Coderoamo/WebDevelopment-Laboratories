<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory Table</title>
</head>
<body>

<!-- Form for adding new products -->
<form id="productForm" onsubmit="return false;">
  <input type="text" id="nameInput" placeholder="Product Name" required />
  <input type="number" id="priceInput" placeholder="Price" required />
  <input type="number" id="stockInput" placeholder="Stock Quantity" required />
  <button id="addBtn">Add Product</button>
</form>

<!-- Table displaying inventory -->
<table border="1" style="margin-top:20px; border-collapse: collapse;">
  <thead>
    <tr>
      <th>ID</th>
      <th>Item Name</th>
      <th>Price</th>
      <th>Stock</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <!-- Rows will be injected here -->
  </tbody>
</table>

<script>
  // Initialize inventory with 5 sample products
  const inventory = [
    { id: 1, name: "Laptop", price: 999.99, stock: 10 },
    { id: 2, name: "Smartphone", price: 599.99, stock: 25 },
    { id: 3, name: "Headphones", price: 199.99, stock: 50 },
    { id: 4, name: "Keyboard", price: 49.99, stock: 100 },
    { id: 5, name: "Monitor", price: 249.99, stock: 20 }
  ];

  let nextId = 6; // Next ID to assign

  // Function to render the table
  function renderTable() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = ""; // Clear existing rows

    inventory.forEach(product => {
      const row = document.createElement("tr");
      
      // ID Cell
      const idCell = document.createElement("td");
      idCell.textContent = product.id;
      row.appendChild(idCell);
      
      // Item Name Cell
      const nameCell = document.createElement("td");
      nameCell.textContent = product.name;
      row.appendChild(nameCell);
      
      // Price Cell
      const priceCell = document.createElement("td");
      priceCell.textContent = `$${product.price.toFixed(2)}`;
      row.appendChild(priceCell);
      
      // Stock Cell
      const stockCell = document.createElement("td");
      stockCell.textContent = product.stock;
      row.appendChild(stockCell);
      
      tbody.appendChild(row);
    });
  }

  // Add event listener to the button
  document.getElementById("addBtn").addEventListener("click", () => {
    const name = document.getElementById("nameInput").value.trim();
    const price = parseFloat(document.getElementById("priceInput").value);
    const stock = parseInt(document.getElementById("stockInput").value);

    if (name && !isNaN(price) && !isNaN(stock)) {
      // Add new product to inventory
      inventory.push({ id: nextId++, name, price, stock });
      
      // Clear inputs
      document.getElementById("nameInput").value = "";
      document.getElementById("priceInput").value = "";
      document.getElementById("stockInput").value = "";
      
      // Re-render table
      renderTable();
    } else {
      alert("Please fill out all fields correctly.");
    }
  });

  // Initial rendering
  renderTable();
</script>

</body>
</html>
